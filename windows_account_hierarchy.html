<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows Account Hierarchy — Threat Hunter Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #0f1117;
    --surface2: #161a23;
    --surface3: #1c2130;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;

    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.08);
    --purple-border: rgba(167,139,250,0.25);

    --teal: #2dd4bf;
    --teal-bg: rgba(45,212,191,0.08);
    --teal-border: rgba(45,212,191,0.25);

    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,0.08);
    --blue-border: rgba(96,165,250,0.25);

    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.08);
    --amber-border: rgba(251,191,36,0.25);

    --red: #f87171;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* GRID NOISE BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 24px;
    background: rgba(10,12,16,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--blue);
    background: var(--blue-bg);
    border: 1px solid var(--blue-border);
    padding: 4px 10px;
    border-radius: 4px;
    margin-top: 4px;
    white-space: nowrap;
  }
  .header-text h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  .header-text p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    background: var(--surface);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* LAYOUT */
  .main { display: flex; flex: 1; }

  /* HIERARCHY PANEL */
  .hierarchy-panel {
    width: 380px;
    min-width: 340px;
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 14px 8px 6px;
    text-transform: uppercase;
  }

  /* ACCOUNT NODE */
  .account-node {
    display: flex;
    align-items: stretch;
    gap: 0;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .account-node:hover { border-color: var(--border-hover); background: var(--surface2); }
  .account-node.active { border-color: var(--node-color, var(--blue-border)) !important; background: var(--surface2); }
  .account-node.active .node-accent { opacity: 1; }

  .node-accent {
    width: 3px;
    border-radius: 8px 0 0 8px;
    background: var(--node-color, var(--blue));
    opacity: 0.35;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .node-body {
    padding: 10px 12px;
    flex: 1;
    min-width: 0;
  }
  .node-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .node-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'JetBrains Mono', monospace;
  }
  .node-sid {
    font-size: 10px;
    color: var(--node-color, var(--blue));
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.85;
  }

  .node-arrow {
    display: flex;
    align-items: center;
    padding: 0 10px 0 4px;
    color: var(--text-muted);
    font-size: 12px;
    transition: color 0.15s, transform 0.15s;
  }
  .account-node:hover .node-arrow, .account-node.active .node-arrow {
    color: var(--text);
    transform: translateX(2px);
  }

  /* connector lines */
  .connector {
    display: flex;
    align-items: center;
    padding: 2px 0 2px 22px;
    gap: 8px;
  }
  .connector-line {
    width: 18px;
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
  }
  .connector-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  /* DETAIL PANEL */
  .detail-panel {
    flex: 1;
    padding: 32px 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    color: var(--text-muted);
  }
  .detail-empty .icon { font-size: 40px; opacity: 0.3; }
  .detail-empty p { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  /* DETAIL CONTENT */
  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .detail-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid;
  }
  .detail-header-text { flex: 1; min-width: 0; }
  .detail-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    word-break: break-all;
  }
  .detail-category {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }
  .detail-desc {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.65;
  }

  /* SID block */
  .sid-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
  }
  .sid-block-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .sid-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .sid-breakdown {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .sid-part {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
  }
  .sid-part-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
  }
  .sid-part-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* privilege chips */
  .priv-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .priv-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: var(--surface2);
  }
  .priv-chip.high { border-color: rgba(248,113,113,0.3); color: var(--red); background: rgba(248,113,113,0.06); }
  .priv-chip.med  { border-color: var(--amber-border); color: var(--amber); background: var(--amber-bg); }

  /* info cards grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .info-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .info-card-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .info-card-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }

  /* hunt signals */
  .hunt-list { display: flex; flex-direction: column; gap: 8px; }
  .hunt-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 14px;
    background: rgba(248,113,113,0.04);
    border: 1px solid rgba(248,113,113,0.12);
    border-radius: 8px;
  }
  .hunt-bullet {
    color: var(--red);
    font-size: 12px;
    margin-top: 1px;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .hunt-text { font-size: 13px; color: var(--text-dim); line-height: 1.55; }

  /* KQL block */
  .kql-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .kql-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface3);
  }
  .kql-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--teal);
    text-transform: uppercase;
  }
  .kql-copy {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .kql-copy:hover { color: var(--text); }
  .kql-body {
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
  }
  .kql-kw  { color: #60a5fa; }
  .kql-op  { color: #a78bfa; }
  .kql-str { color: #34d399; }
  .kql-cm  { color: #4b5563; }
  .kql-fn  { color: #fbbf24; }

  /* attack table */
  .attack-table { width: 100%; border-collapse: collapse; }
  .attack-table th {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .attack-table td {
    font-size: 12px;
    padding: 9px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    vertical-align: top;
  }
  .attack-table tr:last-child td { border-bottom: none; }
  .attack-table td:first-child { color: var(--text); }
  .tid {
    display: inline-block;
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.2);
    color: var(--purple);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }

  /* section headings in detail */
  .section-heading {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .detail-content { animation: fadeIn 0.2s ease; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

  @media (max-width: 700px) {
    .main { flex-direction: column; }
    .hierarchy-panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    .detail-panel { padding: 20px 16px; }
    header { padding: 16px; flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-badge">THREAT HUNTER REF</div>
    <div class="header-text">
      <h1>Windows Account Hierarchy</h1>
      <p>NT AUTHORITY → Guest · Built-in, AD, Enterprise, Service &amp; Restricted</p>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Built-in / OS kernel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2dd4bf"></div>Active Directory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>User-created / enterprise</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Restricted / limited</div>
  </div>

  <div class="main">
    <nav class="hierarchy-panel" id="hierarchy"></nav>
    <section class="detail-panel" id="detail">
      <div class="detail-empty">
        <div class="icon">⬡</div>
        <p>Select an account to view full breakdown</p>
      </div>
    </section>
  </div>
</div>

<script>
const ACCOUNTS = [
  {
    id: "system",
    name: "NT AUTHORITY\\SYSTEM",
    alias: "LocalSystem",
    sid: "S-1-5-18",
    category: "Built-in / OS Kernel",
    color: "#a78bfa",
    icon: "⬡",
    tier: 0,
    section: "KERNEL TIER",
    desc: "The highest-privilege identity on any Windows host. Not a user account — a security principal built into the OS kernel with no password, no conventional user profile, and no interactive logon capability by default. Owns kernel objects, the SAM database, and all system services.",
    sid_parts: [
      { val: "S", label: "Marker" },
      { val: "1", label: "Revision" },
      { val: "5", label: "NT Authority" },
      { val: "18", label: "LocalSystem (RID)" }
    ],
    info: [
      { label: "Network Identity", val: "DOMAIN\\HOSTNAME$ (machine account)" },
      { label: "Interactive Logon", val: "Not permitted by default" },
      { label: "Password", val: "None" },
      { label: "Profile", val: "%windir%\\system32\\config\\systemprofile" },
      { label: "Unique per host", val: "No — SID is identical on all Windows installs" },
      { label: "Can be deleted", val: "No" },
    ],
    privileges: [
      { name: "SeTcbPrivilege", level: "high" },
      { name: "SeDebugPrivilege", level: "high" },
      { name: "SeLoadDriverPrivilege", level: "high" },
      { name: "SeBackupPrivilege", level: "med" },
      { name: "SeRestorePrivilege", level: "med" },
      { name: "SeTakeOwnershipPrivilege", level: "med" },
      { name: "SeChangeNotifyPrivilege", level: "" },
      { name: "SeCreateTokenPrivilege", level: "high" },
    ],
    hunt: [
      "Interactive logon (Event 4624 logon type 2) — never expected for SYSTEM",
      "cmd.exe / powershell.exe parented by anything other than services.exe, svchost.exe, or msiexec.exe running as S-1-5-18",
      "FileCreated events with InitiatingProcessAccountSid == S-1-5-18 outside C:\\Windows and C:\\ProgramData\\Microsoft",
      "Outbound network auth from HOSTNAME$ to unusual targets — SYSTEM has no network cred, uses machine account",
      "LSASS memory reads initiated from non-standard SYSTEM processes (T1003.001)"
    ],
    kql: `<span class="kql-cm">// MDE — anomalous SYSTEM shell spawn</span>
<span class="kql-kw">DeviceProcessEvents</span>
<span class="kql-op">|</span> <span class="kql-fn">where</span> AccountSid <span class="kql-op">==</span> <span class="kql-str">"S-1-5-18"</span>
<span class="kql-op">|</span> <span class="kql-fn">where</span> FileName <span class="kql-fn">in~</span> (<span class="kql-str">"cmd.exe"</span>, <span class="kql-str">"powershell.exe"</span>, <span class="kql-str">"mshta.exe"</span>, <span class="kql-str">"wscript.exe"</span>)
<span class="kql-op">|</span> <span class="kql-fn">where</span> <span class="kql-fn">not</span>(InitiatingProcessFileName <span class="kql-fn">in~</span> (
    <span class="kql-str">"services.exe"</span>, <span class="kql-str">"svchost.exe"</span>, <span class="kql-str">"msiexec.exe"</span>))
<span class="kql-op">|</span> <span class="kql-fn">project</span> Timestamp, DeviceName, FileName,
    ProcessCommandLine, InitiatingProcessFileName`,
    attacks: [
      { name: "Token Impersonation", tid: "T1134", desc: "Escalate admin → SYSTEM via token duplication" },
      { name: "Create/Modify Service", tid: "T1543.003", desc: "Register service running as SYSTEM for persistence" },
      { name: "LSASS Credential Dump", tid: "T1003.001", desc: "Requires SYSTEM or SeDebugPrivilege" },
      { name: "Named Pipe Impersonation", tid: "T1134.001", desc: "SYSTEM pipes abused for privilege escalation" },
    ]
  },
  {
    id: "network_service",
    name: "NT AUTHORITY\\NETWORK SERVICE",
    alias: "NetworkService",
    sid: "S-1-5-20",
    category: "Built-in / OS",
    color: "#a78bfa",
    icon: "⬡",
    tier: 0,
    section: null,
    desc: "A reduced-privilege built-in account used by services that need to authenticate over the network. Has fewer local privileges than SYSTEM but presents the machine account credential (HOSTNAME$) for outbound network authentication.",
    sid_parts: [
      { val: "S", label: "Marker" },
      { val: "1", label: "Revision" },
      { val: "5", label: "NT Authority" },
      { val: "20", label: "NetworkService (RID)" }
    ],
    info: [
      { label: "Network Identity", val: "DOMAIN\\HOSTNAME$ (machine account)" },
      { label: "Local Privilege", val: "Reduced — no SeTcbPrivilege" },
      { label: "Interactive Logon", val: "Not permitted" },
      { label: "Password", val: "None" },
      { label: "Unique per host", val: "No — same SID everywhere" },
    ],
    privileges: [
      { name: "SeChangeNotifyPrivilege", level: "" },
      { name: "SeCreateGlobalPrivilege", level: "" },
      { name: "SeImpersonatePrivilege", level: "med" },
    ],
    hunt: [
      "Services running as NETWORK SERVICE executing unexpected child processes",
      "SeImpersonatePrivilege abuse — used in PrintSpoofer / Rogue Potato escalation paths",
      "Outbound connections from services using this account to non-standard hosts"
    ],
    kql: `<span class="kql-cm">// Services running as NETWORK SERVICE spawning shells</span>
<span class="kql-kw">DeviceProcessEvents</span>
<span class="kql-op">|</span> <span class="kql-fn">where</span> AccountSid <span class="kql-op">==</span> <span class="kql-str">"S-1-5-20"</span>
<span class="kql-op">|</span> <span class="kql-fn">where</span> FileName <span class="kql-fn">in~</span> (<span class="kql-str">"cmd.exe"</span>, <span class="kql-str">"powershell.exe"</span>, <span class="kql-str">"sh.exe"</span>)
<span class="kql-op">|</span> <span class="kql-fn">project</span> Timestamp, DeviceName, FileName,
    ProcessCommandLine, InitiatingProcessFileName`,
    attacks: [
      { name: "Potato Attacks", tid: "T1134.002", desc: "SeImpersonatePrivilege → SYSTEM via COM/NTLM relay" },
      { name: "Service Hijacking", tid: "T1574.010", desc: "Replace service binary running as NetworkService" },
    ]
  },
  {
    id: "local_service",
    name: "NT AUTHORITY\\LOCAL SERVICE",
    alias: "LocalService",
    sid: "S-1-5-19",
    category: "Built-in / OS",
    color: "#a78bfa",
    icon: "⬡",
    tier: 0,
    section: null,
    desc: "Minimal-privilege built-in account for services that do not require network authentication. Has no network credential — outbound network connections appear as anonymous or null session. Used for services like SSDP Discovery.",
    sid_parts: [
      { val: "S", label: "Marker" },
      { val: "1", label: "Revision" },
      { val: "5", label: "NT Authority" },
      { val: "19", label: "LocalService (RID)" }

let activeId = null;

function colorFor(acct) {
  return acct.color;
}

function buildHierarchy() {
  const panel = document.getElementById('hierarchy');
  let currentSection = null;

  ACCOUNTS.forEach(acct => {
    if (acct.section && acct.section !== currentSection) {
      currentSection = acct.section;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = acct.section;
      panel.appendChild(lbl);
    }

    const node = document.createElement('div');
    node.className = 'account-node';
    node.id = 'node-' + acct.id;
    node.style.setProperty('--node-color', acct.color);
    node.onclick = () => selectAccount(acct.id);

    node.innerHTML = `
      <div class="node-accent"></div>
      <div class="node-body">
        <div class="node-name">${escHtml(acct.name)}</div>
        <div class="node-sub">${escHtml(acct.alias)}</div>
        <div class="node-sid">${escHtml(acct.sid)}</div>
      </div>
      <div class="node-arrow">›</div>
    `;
    panel.appendChild(node);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function selectAccount(id) {
  if (activeId) {
    const prev = document.getElementById('node-' + activeId);
    if (prev) prev.classList.remove('active');
  }
  activeId = id;
  const el = document.getElementById('node-' + id);
  if (el) el.classList.add('active');

  const acct = ACCOUNTS.find(a => a.id === id);
  renderDetail(acct);
}

function renderDetail(acct) {
  const panel = document.getElementById('detail');
  const c = acct.color;

  const privHtml = acct.privileges.map(p =>
    `<span class="priv-chip ${p.level}">${escHtml(p.name)}</span>`
  ).join('');

  const infoHtml = acct.info.map(i =>
    `<div class="info-card">
      <div class="info-card-label">${escHtml(i.label)}</div>
      <div class="info-card-val">${escHtml(i.val)}</div>
    </div>`
  ).join('');

  const sidPartsHtml = acct.sid_parts.map(p =>
    `<div class="sid-part">
      <div class="sid-part-val" style="color:${c}">${escHtml(p.val)}</div>
      <div class="sid-part-label">${escHtml(p.label)}</div>
    </div>`
  ).join('');

  const huntHtml = acct.hunt.map(h =>
    `<div class="hunt-item">
      <span class="hunt-bullet">▸</span>
      <span class="hunt-text">${escHtml(h)}</span>
    </div>`
  ).join('');

  const attackHtml = acct.attacks.length ? `
    <div>
      <div class="section-heading">MITRE ATT&CK Techniques</div>
      <table class="attack-table">
        <thead><tr>
          <th>Technique</th><th>TID</th><th>Description</th>
        </tr></thead>
        <tbody>
          ${acct.attacks.map(a => `
            <tr>
              <td>${escHtml(a.name)}</td>
              <td><span class="tid">${escHtml(a.tid)}</span></td>
              <td>${escHtml(a.desc)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  panel.innerHTML = `
    <div class="detail-content">
      <div class="detail-header">
        <div class="detail-icon" style="background:${c}18;border-color:${c}44;color:${c};font-size:24px">${acct.icon}</div>
        <div class="detail-header-text">
          <div class="detail-title">${escHtml(acct.name)}</div>
          <div class="detail-category" style="color:${c}">${escHtml(acct.category)}</div>
          <div class="detail-desc">${escHtml(acct.desc)}</div>
        </div>
      </div>

      <div class="sid-block">
        <div class="sid-block-label">Security Identifier (SID)</div>
        <div class="sid-value" style="color:${c}">${escHtml(acct.sid)}</div>
        <div class="sid-breakdown">${sidPartsHtml}</div>
      </div>

      <div>
        <div class="section-heading">Key Attributes</div>
        <div class="info-grid">${infoHtml}</div>
      </div>

      <div>
        <div class="section-heading">Privileges & Rights</div>
        <div class="priv-grid">${privHtml}</div>
      </div>

      <div>
        <div class="section-heading">Hunt Signals</div>
        <div class="hunt-list">${huntHtml || '<div style="color:var(--text-muted);font-size:13px;font-family:JetBrains Mono,monospace">No specific hunt signals defined.</div>'}</div>
      </div>

      <div>
        <div class="section-heading">MDE KQL Reference</div>
        <div class="kql-block">
          <div class="kql-header">
            <span class="kql-label">Microsoft Defender for Endpoint</span>
            <button class="kql-copy" onclick="copyKql(this)">copy</button>
          </div>
          <div class="kql-body" id="kql-raw-${acct.id}">${acct.kql}</div>
        </div>
      </div>

      ${attackHtml}
    </div>
  `;
}

function copyKql(btn) {
  const block = btn.closest('.kql-block').querySelector('.kql-body');
  const text = block.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied ✓';
    setTimeout(() => btn.textContent = 'copy', 1800);
  });
}

buildHierarchy();
// auto-select first
selectAccount('system');
